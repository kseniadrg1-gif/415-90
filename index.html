<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Дизайн на заказ — 415×90</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #04060f;
        font-family: "Montserrat", sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px;
      }
      .banner-base {
        background: linear-gradient(
          135deg,
          rgba(10, 14, 45, 0.97) 0%,
          rgba(6, 9, 28, 0.99) 100%
        );
        border: 1px solid rgba(80, 120, 255, 0.18);
        border-radius: 24px;
        position: relative;
        overflow: hidden;
        box-shadow:
          0 0 0 1px rgba(80, 120, 255, 0.08),
          0 24px 60px rgba(0, 0, 0, 0.7),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }
      .banner-base:hover {
        transform: translateY(-3px);
        box-shadow:
          0 0 0 1px rgba(0, 212, 255, 0.3),
          0 32px 80px rgba(0, 0, 0, 0.8);
      }
      .banner-canvas {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }
      .orb {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
      }
      .orb-1 {
        width: 280px;
        height: 280px;
        background: radial-gradient(
          circle,
          rgba(80, 0, 200, 0.45) 0%,
          transparent 70%
        );
        bottom: -120px;
        left: -60px;
        filter: blur(30px);
        animation: orbPulse 6s ease-in-out infinite;
      }
      .orb-2 {
        width: 200px;
        height: 200px;
        background: radial-gradient(
          circle,
          rgba(0, 160, 255, 0.3) 0%,
          transparent 70%
        );
        top: -80px;
        right: -40px;
        filter: blur(25px);
        animation: orbPulse 8s ease-in-out infinite reverse;
      }
      @keyframes orbPulse {
        0%,
        100% {
          transform: scale(1) translate(0, 0);
          opacity: 0.7;
        }
        50% {
          transform: scale(1.3) translate(10px, -10px);
          opacity: 1;
        }
      }
      .grid-lines {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: 0;
        pointer-events: none;
      }
      .corner {
        position: absolute;
        width: 16px;
        height: 16px;
        border-color: rgba(0, 212, 255, 0.4);
        border-style: solid;
        pointer-events: none;
        z-index: 3;
      }
      .corner-tl {
        top: 8px;
        left: 8px;
        border-width: 1px 0 0 1px;
      }
      .corner-tr {
        top: 8px;
        right: 8px;
        border-width: 1px 1px 0 0;
      }
      .corner-bl {
        bottom: 8px;
        left: 8px;
        border-width: 0 0 1px 1px;
      }
      .corner-br {
        bottom: 8px;
        right: 8px;
        border-width: 0 1px 1px 0;
      }
      .banner-base
        > *:not(.orb):not(.grid-lines):not(.banner-canvas):not(
          .floating-badge
        ):not(.corner) {
        position: relative;
        z-index: 2;
      }
      .floating-badge {
        position: absolute;
        width: 30px;
        height: 30px;
        background: rgba(10, 20, 45, 0.85);
        backdrop-filter: blur(8px);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 17px;
        color: white;
        z-index: 15;
        border: 1px solid rgba(0, 212, 255, 0.4);
        animation:
          floatBadge 4s ease-in-out infinite,
          borderPulse 2s ease-in-out infinite;
        pointer-events: none;
      }
      .floating-badge::before {
        content: "";
        position: absolute;
        top: -8px;
        left: -8px;
        right: -8px;
        bottom: -8px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(0, 212, 255, 0.3) 0%,
          rgba(0, 212, 255, 0) 70%
        );
        opacity: 0;
        animation: circleGlow 2s ease-in-out infinite;
      }
      @keyframes circleGlow {
        0% {
          opacity: 0;
          transform: scale(0.8);
        }
        50% {
          opacity: 0.6;
          transform: scale(1.3);
        }
        100% {
          opacity: 0;
          transform: scale(0.8);
        }
      }
      .floating-ps {
        top: 20px;
        right: 70px;
        background: linear-gradient(145deg, #1a2a5e, #0f1a3a);
      }
      .floating-ae {
        top: 20px;
        right: 25px;
        background: linear-gradient(145deg, #5e1a3a, #3a0f2a);
      }
      @keyframes floatBadge {
        0% {
          transform: translateY(0px) rotate(0deg);
        }
        50% {
          transform: translateY(-8px) rotate(3deg);
        }
        100% {
          transform: translateY(0px) rotate(0deg);
        }
      }
      @keyframes borderPulse {
        0% {
          border-color: rgba(0, 212, 255, 0.4);
          box-shadow: 0 0 5px rgba(0, 212, 255, 0.2);
        }
        50% {
          border-color: rgba(0, 212, 255, 0.9);
          box-shadow: 0 0 18px rgba(0, 212, 255, 0.5);
        }
        100% {
          border-color: rgba(0, 212, 255, 0.4);
          box-shadow: 0 0 5px rgba(0, 212, 255, 0.2);
        }
      }
      img {
        filter: brightness(0) invert(1);
        object-fit: contain;
      }
      .btn-order-415 {
        background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        border: none;
        border-radius: 50px;
        font-weight: 800;
        color: #07091a;
        cursor: pointer;
        font-family: "Montserrat", sans-serif;
        transition: all 0.2s;
        white-space: nowrap;
        position: relative;
        z-index: 2;
        animation: buttonGlow 2s ease-in-out infinite;
        padding: 4px 12px;
        font-size: 9px;
        margin-left: auto;
        flex-shrink: 0;
        margin-top: 44px;
        margin-right: 15px;
      }
      .btn-order-415:hover {
        transform: scale(1.02);
        box-shadow:
          0 0 36px rgba(0, 212, 255, 0.7),
          0 0 80px rgba(0, 212, 255, 0.3);
        animation: none;
      }
      @keyframes buttonGlow {
        0% {
          box-shadow: 0 0 5px rgba(0, 212, 255, 0.3);
          transform: scale(1);
        }
        50% {
          box-shadow:
            0 0 25px rgba(0, 212, 255, 0.8),
            0 0 40px rgba(0, 212, 255, 0.4);
          transform: scale(1.01);
        }
        100% {
          box-shadow: 0 0 5px rgba(0, 212, 255, 0.3);
          transform: scale(1);
        }
      }
      @keyframes pulseCard {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.02);
          background: rgba(0, 212, 255, 0.06);
          border-color: rgba(0, 212, 255, 0.25);
        }
        100% {
          transform: scale(1);
        }
      }
      .banner-415x90 {
        width: 415px;
        height: 90px;
        padding: 8px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        position: relative;
      }
      .b415-title {
        font-size: 14px;
        font-weight: 900;
        text-align: left;
        line-height: 1.3;
        flex-shrink: 0;
      }
      .b415-title .white-text {
        color: #ffffff;
        display: block;
      }
      .b415-title .blue-text {
        color: #00d4ff;
        display: block;
      }
      .grid-2cols-415 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        flex: 1;
      }
      .chip-415 {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 5px 6px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 8px;
        font-weight: 600;
        color: #fff;
        transition: all 0.25s;
        cursor: default;
        animation: pulseCard 1.8s infinite ease-in-out;
      }
      .chip-415 img {
        width: 14px;
        height: 14px;
      }
      .chip-415:hover {
        background: rgba(0, 212, 255, 0.1);
        border-color: rgba(0, 212, 255, 0.4);
        transform: translateY(-2px);
        animation: none;
      }
    </style>
  </head>
  <body>
    <div class="banner-base banner-415x90">
      <canvas class="banner-canvas" width="415" height="90"></canvas>
      <div
        class="orb orb-1"
        style="width: 120px; height: 120px; bottom: -60px; left: -30px"
      ></div>
      <div
        class="orb orb-2"
        style="width: 100px; height: 100px; top: -40px; right: -20px"
      ></div>
      <div class="grid-lines"></div>
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <div class="floating-badge floating-ae">Ae</div>
      <div class="floating-badge floating-ps">Ps</div>
      <div class="b415-title">
        <div class="white-text">Дизайн</div>
        <div class="blue-text">на заказ</div>
      </div>
      <div class="grid-2cols-415">
        <div class="chip-415">
          <img src="./creativity.png" alt="" />Брендинг
        </div>
        <div class="chip-415"><img src="./animation.png" alt="" />Моушн</div>
        <div class="chip-415"><img src="./avatar.png" alt="" />Логотипы</div>
        <div class="chip-415">
          <img src="./website-header.png" alt="" />Превью
        </div>
      </div>
      <button
        class="btn-order-415"
        onclick="
          window.open(
            'https://api.whatsapp.com/send/?phone=996999911321&text=Здравствуйте',
            '_blank',
          )
        "
      >
        Заказать →
      </button>
    </div>
    <script>
      const canvas = document.querySelector(".banner-canvas");
      function updateCanvasSize() {
        const rect = document
          .querySelector(".banner-415x90")
          .getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        const ctx = canvas.getContext("2d");
        const stars = [];
        const count = Math.max(
          20,
          Math.floor((canvas.width * canvas.height) / 1800),
        );
        for (let i = 0; i < count; i++)
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.2 + 0.3,
            alpha: 0.2 + Math.random() * 0.5,
            speed: 0.002 + Math.random() * 0.008,
            phase: Math.random() * Math.PI * 2,
          });
        let time = 0;
        function drawStars() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          stars.forEach((s) => {
            const alpha = s.alpha + 0.3 * Math.sin(time * s.speed + s.phase);
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(180,220,255,${Math.min(0.8, Math.max(0.15, alpha))})`;
            ctx.fill();
          });
          time += 0.05;
          requestAnimationFrame(drawStars);
        }
        drawStars();
      }
      updateCanvasSize();
      window.addEventListener("resize", () => updateCanvasSize());
    </script>
  </body>
</html>
